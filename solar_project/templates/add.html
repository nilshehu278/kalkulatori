{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">Add Solar Reading</h1>
                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label for="voltage" class="form-label">Voltage (V)</label>
                        <input type="number" step="any" min="0.0001" class="form-control" id="voltage" name="voltage" required>
                    </div>

                    <div class="mb-3">
                        <label for="current" class="form-label">Current (A)</label>
                        <input type="number" step="any" min="0.0001" class="form-control" id="current" name="current" required>
                    </div>

                    <div class="mb-3">
                        <label for="efficiency" class="form-label">Efficiency (%)</label>
                        <input type="number" step="any" min="0.0001" class="form-control" id="efficiency" name="efficiency" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Save Reading</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
